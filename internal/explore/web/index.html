<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>api-doctor explore</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Local contract analysis</p>
      <h1>api-doctor explore</h1>
      <p id="runContext" class="subtle"></p>
    </div>
    <a href="/api/payload" class="button" target="_blank" rel="noopener">View payload</a>
  </header>

	  <main class="layout">
	    <section class="action-bar" aria-label="Quick investigation actions">
	      <div class="quick-actions" id="quickActions"></div>
	      <div class="reset-control" id="resetControl"></div>
      <div class="lens-controls">
        <label class="field">Search endpoint
          <input id="searchInput" type="search" placeholder="Search path, method, family" list="searchSuggestions" autocomplete="off">
          <datalist id="searchSuggestions"></datalist>
        </label>
        <label class="field">Category
          <select id="categoryFilter"></select>
        </label>
        <label class="field">Burden
          <select id="burdenFilter"></select>
        </label>
        <label class="field">Family pressure
          <select id="familyPriorityFilter">
            <option value="all">all families</option>
            <option value="high">high</option>
            <option value="medium">medium</option>
            <option value="low">low</option>
          </select>
        </label>
        <label class="field toggle-field">
          <span>Include endpoints without issues</span>
          <input id="includeNoIssueRows" type="checkbox">
        </label>
      </div>
	      <p id="lensControlHint" class="subtle lens-control-hint" aria-live="polite"></p>
	    </section>

	    <section id="workflowSection" class="section workflow-section" style="display:none;">
	      <div class="section-heading">
	        <p class="eyebrow">Workflow Guidance</p>
	        <h2>Common workflow chains</h2>
	      </div>
	      <p id="workflowHelp" class="subtle"></p>
	      <div id="workflowChains" class="workflow-chains" aria-live="polite"></div>
	    </section>

	    <section class="section" id="familySurfaceSection">
	      <div class="section-heading">
	        <p class="eyebrow">Primary surface</p>
	        <h2>Family investigation clusters</h2>
	      </div>
	      <p id="familySurfaceHelp" class="subtle"></p>
	      <div id="familySurfaceContext" class="family-surface-context" aria-live="polite"></div>
	      <div id="familySurface" class="family-surface"></div>
	    </section>

	    <section id="endpointDiagnosticsSection" class="section endpoint-diagnostics-section" style="display:none;">
	      <div class="section-heading">
	        <p class="eyebrow">Endpoint inspector</p>
	        <h2>Contract Issues — endpoint inspector</h2>
	      </div>
	      <p id="endpointDiagnosticsHelp" class="subtle"></p>
	      <div id="endpointDiagnosticsBody" class="detail-block" aria-live="polite"></div>
	    </section>

	  </main>

  <script src="/static/app.js"></script>
</body>
</html>
