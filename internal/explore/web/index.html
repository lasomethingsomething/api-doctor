<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>api-doctor explore</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Local contract analysis</p>
      <h1>api-doctor explore</h1>
      <p id="runContext" class="subtle"></p>
    </div>
    <a href="/api/payload" class="button button--payload" target="_blank" rel="noopener" title="Inspect the raw analyzer output backing this view.">View payload</a>
  </header>

	  <main class="layout">
	    <section class="action-bar" aria-label="Quick investigation actions">
	      <div class="quick-actions" id="quickActions"></div>
	      <div class="reset-control" id="resetControl"></div>
      <div class="lens-controls">
        <label class="field">Search endpoint
          <input id="searchInput" type="search" placeholder="Search path, method, family" list="searchSuggestions" autocomplete="off">
          <datalist id="searchSuggestions"></datalist>
        </label>
        <label class="field" title="High, medium, and low summarize how many endpoints in the family carry in-scope findings at each severity.">Severity band
          <select id="familyPriorityFilter">
            <option value="all">all families</option>
            <option value="high">high</option>
            <option value="medium">medium</option>
            <option value="low">low</option>
          </select>
          <span class="field-helper">High = 3+ high-severity endpoints · Medium = any high, or 3+ medium · Low = otherwise</span>
        </label>
      </div>
	      <div id="filterEmptyState" class="filter-empty-state" aria-live="polite"></div>
	    </section>

	    <section class="section" id="familySurfaceSection">
	      <div class="section-heading">
	        <p class="eyebrow">Primary surface</p>
	        <h2>Family investigation clusters</h2>
	      </div>
	      <p id="familySurfaceHelp" class="subtle"></p>
	      <div id="familySurfaceContext" class="family-surface-context" aria-live="polite"></div>
	      <div id="familySurface" class="family-surface"></div>
	    </section>

	    <section id="workflowSection" class="section workflow-section" style="display:none;">
	      <div class="section-heading">
	        <p class="eyebrow">Supporting workflow context</p>
	        <h2>Workflow paths</h2>
	      </div>
	      <p id="workflowHelp" class="subtle"></p>
	      <div id="workflowChains" class="workflow-chains" aria-live="polite"></div>
	    </section>

	    <section class="section" id="endpointListSection">
	      <div class="section-heading">
	        <p class="eyebrow">Endpoint evidence</p>
	        <h2 id="endpointListHeading">Contract Problems — endpoint evidence</h2>
	      </div>
	      <div id="listContext" class="list-context" aria-live="polite"></div>
	      <div class="endpoint-list-surface" aria-label="Endpoint evidence table">
	        <table>
	          <thead>
	            <tr>
	              <th>Endpoint</th>
	              <th>Priority</th>
	              <th>Evidence</th>
	            </tr>
	          </thead>
	          <tbody id="endpointRows"></tbody>
	        </table>
	      </div>
	    </section>

	  </main>

  <script src="/static/app.js"></script>
</body>
</html>
